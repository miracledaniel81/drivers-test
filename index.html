const questionsPerLevel=37

let level=1
let startIndex=0
let endIndex=37

let currentQuestion=0
let score=0
let errors=0

let userAnswers=[]

const quiz=document.getElementById("quiz")
const progress=document.getElementById("progress")

const scoreEl=document.getElementById("score")
const errorsEl=document.getElementById("errors")

const qNum=document.getElementById("qNum")
const levelEl=document.getElementById("level")

const nextBtn=document.getElementById("nextBtn")
const prevBtn=document.getElementById("prevBtn")
const skipBtn=document.getElementById("skipBtn")

function startLevel(selectedLevel){
  level=selectedLevel
  startIndex=(level-1)*questionsPerLevel
  endIndex=startIndex+questionsPerLevel
  currentQuestion=startIndex
  score=0
  errors=0
  userAnswers=Array(questions.length).fill(null)
  document.getElementById("startScreen").style.display="none"
  document.getElementById("quizScreen").style.display="block"
  levelEl.textContent=level
  scoreEl.textContent=0
  errorsEl.textContent=0
  showQuestion()
}

function showQuestion(){
  quiz.innerHTML=""
  let q = questions[currentQuestion]
  qNum.textContent = (currentQuestion - startIndex) + 1
  updateProgress()

  let title = document.createElement("h3")
  title.textContent = q.question
  quiz.appendChild(title)

  if(q.image){
    let img = document.createElement("img")
    img.src = q.image
    img.alt = "Image de la question"
    img.style.maxWidth = "100%"
    img.style.margin = "10px 0"
    quiz.appendChild(img)
  }

  q.answers.forEach((ans, index) => {
    let btn = document.createElement("button")
    let letter = String.fromCharCode(97+index)
    btn.textContent = letter+". "+ans.text
    btn.onclick = () => selectAnswer(btn, ans)

    if(userAnswers[currentQuestion]){
      btn.disabled = true
      if(ans.text === userAnswers[currentQuestion].selected){
        btn.classList.add(userAnswers[currentQuestion].correct ? "correct" : "wrong")
      }
      if(ans.correct){
        btn.classList.add("correct")
      }
    }

    quiz.appendChild(btn)
  })
}

function selectAnswer(btn,ans){
  let buttons=quiz.querySelectorAll("button")
  buttons.forEach(b=>b.disabled=true)
  let correct=questions[currentQuestion].answers.find(a=>a.correct)

  if(ans.correct){
    btn.classList.add("correct")
    score++
  }else{
    btn.classList.add("wrong")
    errors++
    let info=document.createElement("p")
    info.innerHTML="<b>Bonne réponse :</b> "+correct.text
    quiz.appendChild(info)
  }

  scoreEl.textContent=score
  errorsEl.textContent=errors
  userAnswers[currentQuestion]={selected:ans.text, correct:ans.correct}
}

function updateProgress(){
  let percent=((currentQuestion-startIndex)/questionsPerLevel)*100
  progress.style.width=percent+"%"
}

nextBtn.onclick=()=>{
  if(currentQuestion < endIndex-1){
    currentQuestion++
    showQuestion()
  }else{
    finishLevel()
  }
}

function finishLevel(){
  let percent=(score/questionsPerLevel)*100
  const resultEl = document.getElementById("result")

  if(percent >= 95){
    resultEl.innerHTML="🎉 Bravo ! Vous avez réussi ce niveau."
  } else {
    resultEl.innerHTML="Score insuffisant. Essayez encore.<br>"

    const homeBtn = document.createElement("button")
homeBtn.textContent = "Retour à l'accueil"
homeBtn.style.marginTop = "10px"
homeBtn.style.background = "#ff9800"   // couleur orange
homeBtn.style.color = "white"          // texte blanc
homeBtn.style.border = "none"
homeBtn.style.borderRadius = "6px"
homeBtn.style.padding = "10px 20px"
homeBtn.style.cursor = "pointer"
homeBtn.onclick = () => {
  document.getElementById("quizScreen").style.display="none"
  document.getElementById("startScreen").style.display="block"
  resultEl.innerHTML=""
}

    resultEl.appendChild(homeBtn)
  }
}

prevBtn.onclick=()=>{
  if(currentQuestion>startIndex){
    currentQuestion--
    showQuestion()
  }
}

skipBtn.onclick=()=>{
  if(!userAnswers[currentQuestion]){
    errors++
    errorsEl.textContent=errors
    let correct=questions[currentQuestion].answers.find(a=>a.correct)
    alert("Question passée.\nBonne réponse : "+correct.text)
    userAnswers[currentQuestion]={selected:null,correct:false}
  }
  if(currentQuestion < endIndex-1){
    currentQuestion++
    showQuestion()
  }
}
</script>
